server:
  port: 9080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200

spring:
  # 修复 Springfox 与 Spring Boot 2.6+ 的兼容性问题
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: dev
  application:
    name: budaos-monolith

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/budaos?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: budaos
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j2
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: budaos
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  # Session配置
  session:
    store-type: redis
    redis:
      namespace: budaos:session
    timeout: 3600m

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # 静态资源映射
  web:
    resources:
      static-locations: file:D:/uploads/,classpath:/static/

  # jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.budaos.common.domain,com.budaos.modules.sys.domain,com.budaos.modules.evgl.**
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true

# PageHelper分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# 日志配置
logging:
  level:
    root: INFO
    com.budaos: DEBUG
    com.budaos.modules: DEBUG
    org.apache.tomcat.util.compat: WARN  # 隐藏Tomcat JDK兼容性探测日志
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/budaos.log
    max-size: 100MB
    max-history: 30

# 应用配置
com.budaos:
  # 文件上传路径
  file-upload-path: D:/uploads/
  # 文件访问路径
  file-access-path: /uploads/
  # 允许跨域
  is-cors: true
  cors-url: "*"
  # Redis标志
  redisFlag: false
  # MQ类型
  mq-type: redis
  # 基础URL
  baseUrl: http://localhost:9080
  # 编辑器图片路径
  cbeditor-image-path: cbeditor-image
  cbeditor-image-suffix:
  cbeditor-media-path: cbeditor-media
  cbeditor-media-suffix:
  cbeditor-file-path: cbeditor-file
  cbeditor-file-suffix:
  # 上传路径配置
  cb-upload-paths: default
  # 第三方登录
  loginBackUrl:
  defaultHeadImg:
  defaultName:
  qqAppId:
  qqAppKey:
  wxAppId:
  wxAppKey:
  xlAppId:
  xlAppKey:
  gitUrl:
  gitTicket:

# OAuth2 安全配置
security:
  oauth2:
    client:
      access-token-uri: http://localhost:9080/oauth/token
      logout: http://localhost:9080/oauth/logout
      client-id: app
      client-secret: app

budaos:
  # 文件上传路径
  upload-path: uploads/
  # 验证码开关
  captcha-enabled: true
  # 单点登录开关（单体应用设为false）
  sso-enabled: false
  # FastDFS配置
  fastdfs:
    tracker-servers: 127.0.0.1:22122
    connect-timeout: 5
    network-timeout: 30
